headlamp:
  serviceAccount:
    create: true
    name: headlamp

  # Giving headlamp view access to the cluster only.
  clusterRoleBinding:
    create: true
    clusterRoleName: view

  # Expose the UI on a NodePort.
  # TODO: Update this to an ingress once one is setup.
  service:
    type: NodePort
    port: 80
    nodePort: 30007

metrics-server:
  args:
    # Lab cluster: kubelet serving certs are kubeadm's self-signed defaults with no IP SANs.
    - --kubelet-insecure-tls