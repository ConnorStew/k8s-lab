---
- name: Prompt
  import_playbook: playbooks/prompt.yml

- name: Install kubeadm prerequisites
  import_playbook: playbooks/prerequisites.yml
  vars:
    k8s_version: "1.35"

- name: Setup cluster
  import_playbook: playbooks/kubernetes.yml
  vars:
    pod_network_cidr: 10.244.0.0/16
    calico_version: v3.32.1
    apiserver_address: 192.168.122.10
