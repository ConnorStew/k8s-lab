---
- name: Install prerequisites
  become: true
  hosts: all
  handlers:
    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted

  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - apt-transport-https
          - gpg
          # Required for the kubernetes modules in ansible.
          - python3-kubernetes
        state: present
        update_cache: true

    # containerd.io comes from Docker's repo, not Debian's
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker apt repository
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/debian
        suites: "{{ ansible_facts['distribution_release'] }}"
        components: stable
        signed_by: /etc/apt/keyrings/docker.asc
        state: present

    - name: Install containerd
      ansible.builtin.apt:
        name: containerd.io
        state: present
        update_cache: true

    # Default containerd install has CRI disabled — generate a full config to enable it
    - name: Generate default containerd config
      ansible.builtin.shell:
        cmd: containerd config default > /etc/containerd/config.toml
      changed_when: true
      notify: Restart containerd

    # kubeadm requires SystemdCgroup=true so containerd and kubelet use the same cgroup driver
    - name: Enable SystemdCgroup in containerd config
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: Restart containerd

    - name: Enable and start containerd
      ansible.builtin.service:
        name: containerd
        state: started
        enabled: true

    # Required for cross-node pod traffic — kernel must forward packets between interfaces
    - name: Enable ip_forward
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
        state: present
        reload: true

    - name: Download Kubernetes GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
        dest: /tmp/kubernetes-release.key
        mode: '0644'

    - name: Dearmor Kubernetes GPG key
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/kubernetes-release.key
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      ansible.builtin.deb822_repository:
        name: kubernetes
        types: deb
        uris: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/"
        suites: /
        signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: present

    - name: Install kubeadm, kubelet, kubectl and cri-tools
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - cri-tools
        state: present
        update_cache: true

    - name: Enable and start kubelet
      ansible.builtin.service:
        name: kubelet
        state: started
        enabled: true

- name: Install control plane extras
  become: true
  hosts: control_plane
  tasks:
    - name: Get kubeadm's pinned image versions
      ansible.builtin.command:
        cmd: kubeadm config images list
      changed_when: false
      register: kubeadm_images

    - name: Derive etcd version from kubeadm
      ansible.builtin.set_fact:
        # registry.k8s.io/etcd:3.6.8-0 -> v3.6.8
        etcd_version: "v{{ kubeadm_images.stdout | regex_search('etcd:([0-9.]+)', '\\1') | first }}"

    - name: Download etcd release tarball
      ansible.builtin.get_url:
        url: "https://github.com/etcd-io/etcd/releases/download/{{ etcd_version }}/etcd-{{ etcd_version }}-linux-amd64.tar.gz"
        dest: "/tmp/etcd-{{ etcd_version }}-linux-amd64.tar.gz"
        mode: '0644'

    - name: Install etcdctl and etcdutl
      ansible.builtin.unarchive:
        src: "/tmp/etcd-{{ etcd_version }}-linux-amd64.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - --strip-components=1
          - --wildcards
          - '*/etcdctl'
          - '*/etcdutl'
